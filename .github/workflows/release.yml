name: Release

on:
  push:
    branches:
      - main
      - staging
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase IMAGE_NAME
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push with Docker Buildx
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.created }}
            VERSION=${{ steps.meta.outputs.version }}
            VCS_REF=${{ github.sha }}

  test-image:
    name: Test Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: yomu
          POSTGRES_PASSWORD: yomu_password
          POSTGRES_DB: yomu_db
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase IMAGE_NAME
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ env.REGISTRY }}/$IMAGE_NAME:latest

      - name: Health check
        run: |
          docker run -d --name test-app \
            --network host \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/yomu_db \
            -e SPRING_DATASOURCE_USERNAME=yomu \
            -e SPRING_DATASOURCE_PASSWORD=yomu_password \
            -e SPRING_PROFILES_ACTIVE=test \
            -e SERVER_PORT=8080 \
            -e RUST_ENGINE_BASE_URL=http://localhost:8081 \
            -e INTERNAL_API_KEY=test-api-key \
            ${{ env.REGISTRY }}/$IMAGE_NAME:latest

          for i in $(seq 1 30); do
            sleep 5
            if curl -sf http://localhost:8080/actuator/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for app to be ready... ($i/30)"
          done
          echo "Health check failed"
          docker logs test-app
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f test-app