name: Continuous Deployment (CD)

on:
  workflow_call:
    inputs:
      environment_name:
        description: Target GitHub environment and deployment tag prefix
        required: true
        type: string
      environment_url:
        description: Public URL for the deployed environment
        required: true
        type: string
      heroku_remote_branch:
        description: Branch name on the Heroku git remote
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: cd-${{ inputs.environment_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: CD - ${{ inputs.environment_name }}
    runs-on: ubuntu-22.04
    environment:
      name: ${{ inputs.environment_name }}
      url: ${{ inputs.environment_url }}
    steps:
      - name: Check out the Git repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
          HEROKU_REMOTE_BRANCH: ${{ inputs.heroku_remote_branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote remove heroku >/dev/null 2>&1 || true
          git remote add heroku "https://heroku:${HEROKU_API_KEY}@git.heroku.com/${HEROKU_APP_NAME}.git"
          git push heroku "HEAD:refs/heads/${HEROKU_REMOTE_BRANCH}" --force
          DEPLOYED_AT="$(date -u +%Y%m%d-%H%M%S)"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          TAG_NAME="deploy/${{ inputs.environment_name }}/${DEPLOYED_AT}-${SHORT_SHA}"
          git tag -a "${TAG_NAME}" -m "Deploy ${{ inputs.environment_name }} to ${HEROKU_APP_NAME} from ${GITHUB_SHA}"
          git push origin "${TAG_NAME}"
