spring.config.import=optional:file:.env[.properties]
spring.application.name=yomu-backend-java
server.port=${SERVER_PORT:8081}
server.shutdown=graceful
server.forward-headers-strategy=framework
spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_TIMEOUT:30s}

# Database configuration - supports DATABASE_URL (cloud) or individual params (local/docker-compose)
# Cloud platforms like Render/Railway provide DATABASE_URL in format: postgres://user:pass@host:port/db
spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5433/yomu_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}

# --- HikariCP Connection Pool (Production Tuning) ---
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONN_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}
spring.datasource.hikari.leak-detection-threshold=${DB_POOL_LEAK_DETECTION:30000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE:300000}

spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

jwt.secret=${JWT_SECRET:ini_adalah_kunci_rahasia_yang_sangat_panjang_dan_aman_untuk_keperluan_testing_adpro}
jwt.issuer=${JWT_ISSUER:yomu-backend-java}
jwt.audience=${JWT_AUDIENCE:yomu-clients}
internal.api.key=${INTERNAL_API_KEY:any_random_key_for_internal_sync}
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
rust.engine.base-url=${RUST_ENGINE_BASE_URL:http://localhost:8080}
rust.integration.transport=${RUST_INTEGRATION_TRANSPORT:grpc}
rust.grpc.deadline-ms=${RUST_GRPC_DEADLINE_MS:3000}
outbox.scheduler.enabled=${OUTBOX_SCHEDULER_ENABLED:true}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:false}

spring.grpc.client.channels.rust-engine.address=static://${RUST_ENGINE_GRPC_HOST:localhost}:${RUST_ENGINE_GRPC_PORT:9090}
spring.grpc.client.channels.rust-engine.negotiation-type=${RUST_ENGINE_GRPC_NEGOTIATION_TYPE:plaintext}

--- Actuator / Health (available in all profiles for CI health checks) ---
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db

--- Observability: Micrometer + Prometheus ---
# Micrometer registry: enable Prometheus exporter (scraped by your infra prometheus)
management.metrics.export.prometheus.enabled=true
management.metrics.export.prometheus.step=60s
# Enable tracing bridge so Micrometer traces flow to OTEL
management.tracing.otel.enabled=true
management.tracing.otel.tracing.enabled=true
management.tracing.sampling.probability=1.0

--- Observability: OTEL SDK (Micrometer → OTEL SDK → your OTEL Collector) ---
otel.sdk.enabled=true
otel.resource.attributes=service.name=${spring.application.name}
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.exporter.otlp.traces.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

--- Observability: Sentry ---
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SPRING_PROFILES_ACTIVE:dev}
sentry.traces-sample-rate=0.1
sentry.server-name=${HOSTNAME:unknown}
sentry.release=${HOSTNAME:unknown}
