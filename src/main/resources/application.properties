spring.application.name=yomu-backend-java

# Database configuration - supports DATABASE_URL (cloud) or individual params (local/docker-compose)
# Cloud platforms like Render/Railway provide DATABASE_URL in format: postgres://user:pass@host:port/db
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://postgres:5432/yomu_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

jwt.secret=${JWT_SECRET}
internal.api.key=${INTERNAL_API_KEY}
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
rust.engine.base-url=${RUST_ENGINE_BASE_URL:http://localhost:8081}
