# Production profile - inherits application.properties then overrides
# Activate via SPRING_PROFILES_ACTIVE=prod

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# --- HikariCP (Production Overrides) ---
# Match Rust engine pool defaults: max 20, min 5, 5s timeout
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
# Leak detection: 30s is aggressive but catches unclosed connections before they exhaust the pool
spring.datasource.hikari.leak-detection-threshold=${DB_POOL_LEAK_DETECTION:30000}
# Keepalive: 5min to survive cloud platform idle-connection timeouts (Render/Railway firewalls/NAT)
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE:300000}
# Recycle connections every 30min to avoid backend-side connection aging and prepared-statement leaks
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}
# Idle timeout: 5min — close idle connections to free Postgres slots
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:300000}
# Connection timeout: 30s — tolerate brief Postgres load spikes
spring.datasource.hikari.connection-timeout=${DB_POOL_CONN_TIMEOUT:30000}

# --- Actuator / Health ---
# Expose health, metrics, prometheus endpoints for orchestration and monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.show-components=always
management.health.db.enabled=true
# Prometheus endpoint must be accessible for your infra prometheus scrape
management.metrics.export.prometheus.enabled=true

# --- Logging ---
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
# Enable JSON logging in production (logback-spring.xml activates CONSOLE_JSON + FILE_JSON)
logging.config=classpath:logback-spring.xml
